<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>宿検索サイト</title>
  <style>
    body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f5f5f5; }
    header { background: #232f3e; color: white; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; }
    header h2 { margin:0; }
    header input[type=text] { flex:1; margin-left:20px; padding:5px 10px; border-radius:3px; border:none; }
    .products { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; padding:20px; }
    .card { background:white; border:1px solid #ddd; padding:10px; border-radius:5px; box-shadow:0 2px 5px rgba(0,0,0,0.1); transition: transform 0.2s; }
    .card:hover { transform: scale(1.03); }
    .card img { width:100%; height:150px; object-fit:cover; border-radius:3px; }
    .price { color: #b12704; font-weight:bold; margin:5px 0; }
    button { background:#f0c14b; border:1px solid #a88734; padding:5px 10px; cursor:pointer; border-radius:3px; width:100%; }
    a { text-decoration: none; color: inherit; }
  </style>
</head>
<body>

<header>
  <h2>宿検索サイト</h2>
  <input type="text" placeholder="宿名や地域を検索">
</header>

<div class="products">
  <div class="card">
    <img src="https://placekitten.com/200/150" alt="鳥取砂丘ホテル">
    <h3>鳥取砂丘ホテル</h3>
    <p class="price">¥12,000</p>
    <button>予約する</button>
  </div>
  <div class="card">
    <a href="https://www.yukurina-resort.com/" target="_blank">
      <img src="https://placekitten.com/201/150" alt="沖縄ビーチリゾート">
      <h3>沖縄ビーチリゾート</h3>
      <p class="price">¥18,000</p>
      <button>予約する</button>
    </a>
  </div>
  <div class="card">
    <img src="https://placekitten.com/202/150" alt="箱根温泉旅館">
    <h3>箱根温泉旅館</h3>
    <p class="price">¥15,000</p>
    <button>予約する</button>
  </div>
</div>

</body>
</html>
