<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>楽天ホテル検索</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  padding: 40px;
}
h1 {
  text-align: center;
}
.search-box {
  text-align: center;
  margin-bottom: 30px;
}
input {
  padding: 10px;
  width: 250px;
  font-size: 16px;
}
button {
  padding: 10px 20px;
  font-size: 16px;
  cursor: pointer;
}
.hotel {
  background: white;
  padding: 20px;
  margin-bottom: 20px;
  border-radius: 8px;
}
.hotel img {
  max-width: 200px;
}
</style>
</head>
<body>

<h1>楽天ホテル検索</h1>

<div class="search-box">
  <input id="keyword" placeholder="例：沖縄">
  <button onclick="searchHotel()">検索</button>
</div>

<div id="results"></div>

<script>
async function searchHotel() {
  const keyword = document.getElementById("keyword").value;
  const resultsDiv = document.getElementById("results");
  resultsDiv.innerHTML = "検索中...";

  const url = `https://openapi.rakuten.co.jp/engine/api/Travel/KeywordHotelSearch/20170426?format=json&keyword=${encodeURIComponent(keyword)}&applicationId=ec65ace1-9e87-4d23-83e4-b54103335b56&accessKey=pk_thp8WuFagFNOQh9VnsoWHJ8mAQhhRsHt4NWvW4wUA4q`;

  try {
    const response = await fetch(url);
    const data = await response.json();

    if (!data.hotels) {
      resultsDiv.innerHTML = "データが見つかりません";
      return;
    }

    resultsDiv.innerHTML = "";

    data.hotels.forEach(h => {
      const info = h.hotel[0].hotelBasicInfo;

      const div = document.createElement("div");
      div.className = "hotel";

      div.innerHTML = `
        <h2>${info.hotelName}</h2>
        <img src="${info.hotelImageUrl}">
        <p>住所: ${info.address1}${info.address2}</p>
        <p>料金: ${info.hotelMinCharge || "不明"} 円〜</p>
        <a href="${info.hotelInformationUrl}" target="_blank">詳細を見る</a>
      `;

      resultsDiv.appendChild(div);
    });

  } catch (err) {
    resultsDiv.innerHTML = "エラー発生";
    console.error(err);
  }
}
</script>

</body>
</html>
