<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>とまるん</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<h2>目的地検索（近い順）</h2>

<input type="text" id="keyword" placeholder="例：沖縄美ら海水族館">
<button onclick="searchHotels()">検索</button>

<hr>
<div id="results"></div>

<script>

async function searchHotels() {

    const keyword = document.getElementById("keyword").value;
    if (!keyword) {
        alert("目的地を入力してください");
        return;
    }

    const res = await fetch(`/search?keyword=${encodeURIComponent(keyword)}`);
    const data = await res.json();

    const resultsDiv = document.getElementById("results");
    resultsDiv.innerHTML = "";

    if (!data.hotels || data.hotels.length === 0) {
        resultsDiv.innerHTML = "ホテルが見つかりません";
        return;
    }

    data.hotels.forEach(h => {
        const html = `
        <div style="border:1px solid #ccc;padding:15px;margin:15px 0;">
            <h3>${h.name}</h3>
            <p>料金： ¥${h.price ?? "情報なし"}</p>
            <p>距離： ${h.distance} km</p>
            <a href="${h.url}" target="_blank">楽天で見る</a>
        </div>
        `;
        resultsDiv.innerHTML += html;
    });
}

</script>

</body>
</html>
