<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOMARUN - 目的地から宿を探す</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #eaeded; margin: 0; padding: 0; }
        header { background-color: #232f3e; padding: 15px; text-align: center; color: white; }
        .search-box { margin: 20px auto; max-width: 600px; display: flex; gap: 10px; padding: 0 15px; }
        input[type="text"] { flex-grow: 1; padding: 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
        button { background-color: #febd69; border: none; padding: 10px 25px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        
        .container { max-width: 1300px; margin: 0 auto; padding: 20px; display: grid; 
                     grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        
        .hotel-card { background: white; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; 
                      display: flex; flex-direction: column; transition: transform 0.2s; }
        .hotel-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .hotel-image { width: 100%; height: 200px; object-fit: cover; }
        .hotel-info { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        .hotel-name { font-size: 16px; font-weight: bold; color: #007185; margin-bottom: 8px; 
                      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .price { font-size: 20px; font-weight: bold; color: #B12704; margin: 10px 0; }
        
        .reserve-link { 
            display: block; 
            background-color: #ffd814; 
            color: #0f1111; 
            text-align: center; 
            padding: 12px; 
            border-radius: 20px; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 14px; 
            margin-top: auto;
            border: 1px solid #a88734;
        }
        .reserve-link:hover { background-color: #f7ca00; }
    </style>
</head>
<body>

<header>
    <h1>TOMARUN (とまるん)</h1>
</header>

<form class="search-box" method="POST">
    <input type="text" name="keyword" placeholder="どこに行きたいですか？ (例: 沖縄, 札幌)" value="{{ keyword }}" required>
    <button type="submit">検索</button>
</form>

<div class="container">
    {% for hotel in hotels %}
    <div class="hotel-card">
        <img src="{{ hotel.hotelImageUrl }}" alt="宿の画像" class="hotel-image">
        <div class="hotel-info">
            <div class="hotel-name">{{ hotel.hotelName }}</div>
            <div class="price">
                {% if hotel.hotelMinCharge %}
                    ￥{{ "{:,}".format(hotel.hotelMinCharge) }}〜
                {% else %}
                    価格未定
                {% endif %}
            </div>
            {# リンク先を hotel.target_url に修正 #}
            <a href="{{ hotel.target_url }}" target="_blank" rel="noopener noreferrer" class="reserve-link">楽天トラベルで空室確認</a>
        </div>
    </div>
    {% endfor %}
</div>

</body>
</html>
