<style>
    /* 追加するCSS：Amazon風の4分割 & カルーセル */
    .recommend-section { margin-top: 10px; overflow: hidden; }
    .carousel-container { 
        display: flex; 
        overflow-x: auto; 
        scroll-snap-type: x mandatory; 
        padding: 0 15px 20px 15px;
        gap: 15px;
        -webkit-overflow-scrolling: touch; /* スマホでスルスル動く */
    }
    /* スクロールバーを隠す */
    .carousel-container::-webkit-scrollbar { display: none; }

    .spot-grid-block { 
        flex: 0 0 85%; /* 85%にすることで次のブロックが少し見える */
        scroll-snap-align: start;
        background: white;
        border-radius: 16px;
        padding: 12px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .spot-grid { 
        display: grid; 
        grid-template-columns: 1fr 1fr; 
        gap: 8px; 
    }
    .spot-card { cursor: pointer; text-align: center; }
    .spot-card img { 
        width: 100%; height: 80px; object-fit: cover; border-radius: 8px; 
        background: #eee;
    }
    .spot-card span { font-size: 11px; font-weight: 600; display: block; margin-top: 4px; color: #333; }
    .grid-label { font-size: 13px; font-weight: 700; margin: 10px 0 0 0; color: #1d1d1f; }

    /* 既存のcontainer（宿一覧）との間隔調整 */
    .container { margin-top: 10px; }
</style>

<script>
    // 写真をタップしたら自動で検索する魔法
    function quickSearch(keyword) {
        const input = document.querySelector('input[name="keyword"]');
        const form = document.querySelector('form');
        input.value = keyword;
        form.submit();
    }
</script>
