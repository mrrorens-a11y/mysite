<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOMARUN | 宿泊予約</title>
    <style>
        :root {
            --apple-blue: #0071e3;
            --apple-bg: #f5f5f7;
        }
        body { font-family: -apple-system, sans-serif; background: var(--apple-bg); margin: 0; padding: 0; color: #1d1d1f; }
        header { background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); padding: 18px; text-align: center; border-bottom: 1px solid #d2d2d7; position: sticky; top: 0; z-index: 100; font-weight: bold; }
        .search-area { max-width: 600px; margin: 30px auto; padding: 0 20px; display: flex; gap: 10px; }
        input { flex: 1; padding: 14px; border-radius: 12px; border: 1px solid #d2d2d7; font-size: 16px; outline: none; }
        button { background: var(--apple-blue); color: white; border: none; padding: 10px 25px; border-radius: 12px; font-weight: 600; cursor: pointer; }
        .container { max-width: 800px; margin: 0 auto; padding: 0 20px; }
        .card { background: white; border-radius: 20px; margin-bottom: 25px; display: flex; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .hotel-img { width: 240px; height: 180px; object-fit: cover; }
        .info { padding: 20px; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .name { font-size: 19px; font-weight: 700; margin: 0; }
        .address { font-size: 13px; color: #86868b; margin: 5px 0; }
        .price-box { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid #f2f2f2; padding-top: 15px; }
        .price { font-size: 20px; font-weight: 700; color: #d6001c; }
        .btn { background: var(--apple-blue); color: white; text-decoration: none; padding: 8px 18px; border-radius: 10px; font-size: 13px; font-weight: 600; }
        @media (max-width: 600px) { .card { flex-direction: column; } .hotel-img { width: 100%; height: 200px; } }
    </style>
</head>
<body>
<header>TOMARUN</header>
<form class="search-area" method="POST">
    <input type="text" name="keyword" placeholder="どこに泊まりますか？" value="{{ keyword }}">
    <button type="submit">検索</button>
</form>
<div class="container">
    {% if debug_msg %}<p style="text-align:center; color:red;">{{ debug_msg }}</p>{% endif %}
    {% for h in hotels %}
    <div class="card">
        <img src="{{ h.image }}" class="hotel-img">
        <div class="info">
            <div>
                <h2 class="name">{{ h.name }}</h2>
                <p class="address">📍 {{ h.address }}</p>
            </div>
            <div class="price-box">
                <span class="price">{{ h.price }}</span>
                <a href="{{ h.url }}" class="btn" target="_blank">楽天トラベルで予約</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
</body>
</html>
