<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOMARUN</title>
    <style>
        :root { --apple-blue: #0071e3; --apple-bg: #f5f5f7; }
        body { font-family: -apple-system, sans-serif; background-color: var(--apple-bg); margin: 0; padding-bottom: 50px; }
        header { background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); padding: 20px; text-align: center; border-bottom: 1px solid #d2d2d7; position: sticky; top: 0; z-index: 100; font-weight: 700; }
        .search-area { max-width: 600px; margin: 30px auto; padding: 0 20px; display: flex; gap: 10px; }
        input { flex: 1; padding: 14px; border-radius: 12px; border: 1px solid #d2d2d7; font-size: 16px; outline: none; }
        button { background: var(--apple-blue); color: white; border: none; padding: 10px 25px; border-radius: 12px; font-weight: 600; cursor: pointer; }
        .container { max-width: 800px; margin: 0 auto; padding: 0 20px; }
        .card { background: white; border-radius: 20px; margin-bottom: 20px; display: flex; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .hotel-img { width: 200px; height: 150px; object-fit: cover; }
        .info { padding: 20px; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .site-tag { font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 4px; display: inline-block; margin-bottom: 5px; }
        .tag-Rakuten { background: #bf0000; color: white; }
        .tag-Jalan { background: #ff9900; color: white; }
        .price { font-size: 20px; font-weight: 700; color: #d6001c; }
        .btn { background: var(--apple-blue); color: white; text-decoration: none; padding: 8px 18px; border-radius: 10px; font-size: 13px; font-weight: 600; }
        @media (max-width: 600px) { .card { flex-direction: column; } .hotel-img { width: 100%; } }
    </style>
</head>
<body>
<header>TOMARUN</header>
<form class="search-area" method="POST">
    <input type="text" name="keyword" placeholder="どこへ行きますか？" value="{{ keyword }}">
    <button type="submit">探す</button>
</form>
<div class="container">
    {% for h in hotels %}
    <div class="card">
        <img src="{{ h.image }}" class="hotel-img">
        <div class="info">
            <div>
                <span class="site-tag tag-{{ h.site }}">{{ h.site }}</span>
                <h3 style="margin:0; font-size:17px;">{{ h.name }}</h3>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:15px;">
                <span class="price">{{ h.price }}</span>
                <a href="{{ h.url }}" class="btn" target="_blank">予約する</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
</body>
</html>
