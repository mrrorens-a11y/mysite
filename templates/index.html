<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">
<title>観光地近くのホテル検索</title>

<style>

body{
font-family:sans-serif;
padding:20px;
}

.hotel{
border:1px solid #ddd;
padding:10px;
margin-bottom:15px;
}

img{
width:100%;
max-width:250px;
}

</style>

</head>

<body>

<h2>観光地近くのホテル検索</h2>

<form method="POST">

<input type="text" name="keyword" placeholder="美ら海水族館" value="{{keyword}}">
<button type="submit">検索</button>

</form>

<br>

{% for h in hotels %}

<div class="hotel">

<img src="{{h.hotelImageUrl}}">

<h3>{{h.hotelName}}</h3>

<p>{{h.address}}</p>

<p>最安料金 ¥{{h.price}}</p>

<p>距離 {{h.distance}}</p>

<a href="{{h.url}}" target="_blank">楽天トラベルで見る</a>

</div>

{% endfor %}

</body>
</html>
