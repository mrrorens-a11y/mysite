<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>TOMARUN 調査中</title>
    <style>
        body { font-family: sans-serif; background: #f5f5f7; padding: 20px; }
        .status-box { background: #333; color: #fff; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-family: monospace; }
        .card { background: white; padding: 15px; border-radius: 15px; margin-top: 10px; display: flex; gap: 15px; }
    </style>
</head>
<body>
    <header><h1>TOMARUN</h1></header>
    <form method="POST">
        <input type="text" name="keyword" value="{{ keyword }}" placeholder="地名を入力">
        <button type="submit">検索</button>
    </form>

    {% if api_status %}
    <div class="status-box">
        🔍 調査結果: {{ api_status }}
    </div>
    {% endif %}

    {% for h in hotels %}
    <div class="card">
        <img src="{{ h.image }}" width="150">
        <div>
            <h3>{{ h.name }}</h3>
            <p>{{ h.price }} / {{ h.address }}</p>
        </div>
    </div>
    {% endfor %}
</body>
</html>
