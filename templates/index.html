<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>TOMARUN 調査モード</title>
    <style>
        body { font-family: sans-serif; background: #f5f5f7; margin: 0; padding: 20px; }
        .search-box { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 15px; }
        .debug-panel { background: #fee; color: #d00; padding: 10px; margin: 10px 0; border-radius: 8px; font-size: 12px; }
        .hotel-card { background: white; padding: 15px; margin-top: 10px; border-radius: 10px; display: flex; gap: 15px; }
        .tag { font-size: 10px; padding: 2px 5px; color: white; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="search-box">
        <form method="POST">
            <input type="text" name="keyword" value="{{ keyword }}" placeholder="地名を入力">
            <button type="submit">検索</button>
        </form>
        
        {% if debug_msg %}
        <div class="debug-panel">{{ debug_msg }}</div>
        {% endif %}

        {% for h in hotels %}
        <div class="hotel-card">
            <img src="{{ h.image }}" width="100">
            <div>
                <span class="tag" style="background:{% if h.site=='Rakuten' %}#bf0000{% else %}#ff9900{% endif %};">{{ h.site }}</span>
                <h3 style="margin:5px 0;">{{ h.name }}</h3>
                <p>価格: {{ h.price }}〜 / <a href="{{ h.url }}" target="_blank">詳細</a></p>
            </div>
        </div>
        {% endfor %}
    </div>
</body>
</html>
