<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>とまるん</title>

<style>

:root{
--apple-blue:#0071e3;
--apple-bg:#f5f5f7;
}

body{
font-family:-apple-system;
background:var(--apple-bg);
margin:0;
}

header{
text-align:center;
font-weight:700;
padding:20px;
font-size:22px;
background:white;
position:sticky;
top:0;
}

.search{
display:flex;
gap:10px;
padding:20px;
max-width:600px;
margin:auto;
}

input{
flex:1;
padding:14px;
border-radius:12px;
border:1px solid #ccc;
}

button{
background:var(--apple-blue);
color:white;
border:none;
padding:14px;
border-radius:12px;
}

.container{
max-width:800px;
margin:auto;
padding:20px;
}

.section-title{
font-size:20px;
font-weight:700;
margin-top:30px;
margin-bottom:10px;
}

.hotel{
background:white;
border-radius:16px;
margin-bottom:20px;
overflow:hidden;
box-shadow:0 4px 15px rgba(0,0,0,0.05);
}

.hotel img{
width:100%;
height:200px;
object-fit:cover;
}

.info{
padding:15px;
}

.price{
color:#d6001c;
font-size:20px;
font-weight:700;
}

.btn{
background:var(--apple-blue);
color:white;
padding:10px 16px;
border-radius:8px;
text-decoration:none;
float:right;
}

</style>
</head>


<body>

<header>とまるん</header>

<form method="POST" class="search">

<input
type="text"
name="keyword"
placeholder="目的地を入力"
value="{{keyword}}"
/>

<button>検索</button>

</form>


<div class="container">

<div class="section-title">楽天トラベル</div>

{% for h in rakuten_hotels %}

<div class="hotel">

<img src="{{h.hotelImageUrl}}">

<div class="info">

<b>{{h.hotelName}}</b><br>

<div class="price">¥{{h.hotelMinCharge}}</div>

<a class="btn" href="{{h.target_url}}" target="_blank">
予約
</a>

</div>

</div>

{% endfor %}



<div class="section-title">じゃらん</div>

{% for h in jalan_hotels %}

<div class="hotel">

<img src="{{h.image}}">

<div class="info">

<b>{{h.name}}</b><br>

<div class="price">¥{{h.price}}</div>

<a class="btn" href="{{h.url}}" target="_blank">
予約
</a>

</div>

</div>

{% endfor %}


</div>

</body>
</html>
