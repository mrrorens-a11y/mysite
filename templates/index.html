<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宿検索 | Minimal Stay Search</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --apple-bg: #f5f5f7;
            --apple-card: #ffffff;
            --apple-text: #1d1d1f;
            --apple-blue: #0066cc;
            --amazon-orange: #ff9900;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
        }

        body {
            font-family: 'SF Pro Display', 'Noto Sans JP', sans-serif;
            background-color: var(--apple-bg);
            color: var(--apple-text);
            margin: 0;
            padding: 20px;
            line-height: 1.5;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-weight: 500;
            letter-spacing: -0.02em;
            margin-bottom: 30px;
        }

        /* 検索フォーム：Amazon的なシンプルさ */
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 40px;
            background: var(--apple-card);
            padding: 15px;
            border-radius: 12px;
            box-shadow: var(--shadow);
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #d2d2d7;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }

        button {
            background-color: var(--apple-text);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.8;
        }

        /* エラーメッセージ表示エリア */
        .error-banner {
            background-color: #fff2f2;
            color: #d70000;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid #ffdada;
        }

        /* 宿カード：Apple的な高級感 */
        .hotel-card {
            background: var(--apple-card);
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            display: flex;
            gap: 20px;
            transition: transform 0.2s ease;
        }

        .hotel-card:hover {
            transform: translateY(-4px);
        }

        .hotel-image {
            width: 180px;
            height: 140px;
            object-fit: cover;
            border-radius: 12px;
        }

        .hotel-info {
            flex: 1;
        }

        .hotel-name {
            font-size: 18px;
            font-weight: 700;
            margin: 0 0 10px 0;
        }

        .price-list {
            list-style: none;
            padding: 0;
            margin: 10px 0;
        }

        /* OTAごとの縦並び料金比較 */
        .price-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #f2f2f2;
        }

        .price-item:last-child {
            border-bottom: none;
        }

        .ota-label {
            font-size: 14px;
            color: #86868b;
        }

        .ota-price {
            font-weight: 600;
            font-size: 16px;
        }

        .ota-price.rakuten { color: #bf0000; }
        .ota-price.jalan { color: var(--amazon-orange); }

        .btn-reserve {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: var(--apple-blue);
            color: white;
            text-decoration: none;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }

        @media (max-width: 600px) {
            .hotel-card { flex-direction: column; }
            .hotel-image { width: 100%; height: 200px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Stay Finder</h1>

    <form method="POST" class="search-box">
        <input type="text" name="keyword" placeholder="どこに泊まりますか？（例：箱根 温泉）" value="{{ keyword }}" required>
        <button type="submit">検索</button>
    </form>

    {% if error_msg %}
    <div class="error-banner">
        {{ error_msg }}
    </div>
    {% endif %}

    {% for hotel in hotels %}
    <div class="hotel-card">
        <img src="{{ hotel.hotelImageUrl }}" alt="{{ hotel.hotelName }}" class="hotel-image">
        <div class="hotel-info">
            <h2 class="hotel-name">{{ hotel.hotelName }}</h2>
            
            <div class="price-list">
                <div class="price-item">
                    <span class="ota-label">楽天トラベル</span>
                    <span class="ota-price rakuten">
                        {% if hotel.hotelMinCharge %}¥{{ hotel.hotelMinCharge }}〜{% else %}満室{% endif %}
                    </span>
                </div>
                <div class="price-item">
                    <span class="ota-label">じゃらんnet</span>
                    <span class="ota-price jalan">{{ hotel.jalan_price }}</span>
                </div>
            </div>

            <a href="{{ hotel.target_url }}" target="_blank" rel="noopener" class="btn-reserve">楽天で詳細を見る</a>
            <a href="{{ hotel.jalan_url }}" target="_blank" rel="noopener" style="margin-left:10px; color:var(--apple-blue); font-size:13px; text-decoration:none;">じゃらんで見る</a>
        </div>
    </div>
    {% endfor %}
</div>

</body>
</html>
