<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ホテル検索</title>
</head>
<body>
  <h1>目的地周辺ホテル検索</h1>

  <input type="text" id="keyword" placeholder="例：美ら海水族館">
  <button onclick="searchHotels()">検索</button>

  <div id="results"></div>

  <script>
    async function searchHotels() {
      const keyword = document.getElementById("keyword").value;

      const applicationId = "99c6687c-934b-461a-91d2-cccac125bba8";
      const affiliateId = "516c5cc9.1bfc6c7d.516c5cca.f7d5de3e";

      const url =
        `https://openapi.rakuten.co.jp/engine/api/Travel/KeywordHotelSearch/20170426?` +
        `format=json&keyword=${encodeURIComponent(keyword)}` +
        `&applicationId=${applicationId}` +
        `&affiliateId=${affiliateId}` +
        `&hits=20`;

      const response = await fetch(url);
      const data = await response.json();

      const resultsDiv = document.getElementById("results");
      resultsDiv.innerHTML = "";

      if (!data.hotels) {
        resultsDiv.innerHTML = "結果がありません";
        return;
      }

      data.hotels.forEach(hotel => {
        const info = hotel.hotel[0].hotelBasicInfo;

        const hotelDiv = document.createElement("div");
        hotelDiv.innerHTML = `
          <h3>${info.hotelName}</h3>
          <p>${info.address1}${info.address2}</p>
          <a href="${info.hotelInformationUrl}" target="_blank">
            楽天で見る
          </a>
          <hr>
        `;
        resultsDiv.appendChild(hotelDiv);
      });
    }
  </script>
</body>
</html>
