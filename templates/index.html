<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>宿検索</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<h2>目的地検索</h2>

<input type="text" id="keyword" placeholder="例：沖縄">
<button type="button" onclick="searchHotels()">検索</button>

<hr>

<div id="results"></div>

<script>
const APPLICATION_ID = "99c6687c-934b-461a-91d2-cccac125bba8";
const ACCESS_KEY = "pk_X0YMu5r1uH81LhQSx9jkv4w3yEcBaAQ9T1XvueirvEH";
const AFFILIATE_ID = "516c5cc9.1bfc6c7d.516c5cca.f7d5de3e";

async function searchHotels() {
    const keyword = document.getElementById("keyword").value;

    if (!keyword) {
        alert("目的地を入力してください");
        return;
    }

    const url = `https://openapi.rakuten.co.jp/engine/api/Travel/KeywordHotelSearch/20170426?format=json&keyword=${encodeURIComponent(keyword)}&applicationId=${APPLICATION_ID}&accessKey=${ACCESS_KEY}&affiliateId=${AFFILIATE_ID}`;

    try {
        const response = await fetch(url);
        const data = await response.json();

        const resultsDiv = document.getElementById("results");
        resultsDiv.innerHTML = "";

        if (!data.hotels) {
            resultsDiv.innerHTML = "ホテルが見つかりませんでした";
            return;
        }

        data.hotels.forEach(hotel => {
            const info = hotel.hotel[0].hotelBasicInfo;

            const html = `
                <div style="border:1px solid #ccc; padding:15px; margin:15px 0;">
                    <h3>${info.hotelName}</h3>
                    <p>最安料金： ¥${info.hotelMinCharge ?? "情報なし"}</p>
                    <p>住所： ${info.address1}${info.address2}</p>
                    <a href="${info.hotelInformationUrl}" target="_blank">
                        楽天で見る
                    </a>
                </div>
            `;

            resultsDiv.innerHTML += html;
        });

    } catch (error) {
        document.getElementById("results").innerHTML = "エラーが発生しました";
        console.error(error);
    }
}
</script>

</body>
</html>
