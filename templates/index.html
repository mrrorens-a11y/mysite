<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>とまるん</title>

<style>

/* ===== スマホファースト設計 ===== */

body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    background:#ffffff;
    color:#000;
    text-align:center;
}

/* サービス名 */
.logo{
    font-size:30px;
    font-weight:700;
    margin-top:60px;
    letter-spacing:2px;
}

/* キャッチコピー */
.catch{
    font-size:14px;
    color:#555;
    margin-top:10px;
    margin-bottom:40px;
    padding:0 20px;
}

/* 検索エリア */
.search-area{
    padding:0 20px;
}

/* 入力欄 */
input{
    width:100%;
    padding:18px;
    font-size:16px;
    border:2px solid black;
    border-radius:14px;
    box-sizing:border-box;
    margin-bottom:15px;
}

/* ボタン */
button{
    width:100%;
    padding:18px;
    font-size:16px;
    border:none;
    border-radius:14px;
    background:black;
    color:white;
}

button:active{
    opacity:0.85;
}

</style>
</head>

<body>

<div class="logo">とまるん</div>
<div class="catch">目的地から宿を探す新しいカタチ</div>

<div class="search-area">
    <form method="POST">
        <input type="text" name="destination" placeholder="例：美ら海水族館">
        <button type="submit">検索</button>
    </form>
</div>

</body>
</html>
