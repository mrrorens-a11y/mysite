<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOMARUN</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --apple-blue: #0071e3; --apple-bg: #f5f5f7; --card-border: #d2d2d7; }
        body { font-family: -apple-system, "SF Pro Text", sans-serif; background-color: var(--apple-bg); margin: 0; color: #1d1d1f; }
        
        header { 
            background: rgba(255,255,255,0.8); 
            backdrop-filter: blur(20px); 
            padding: 12px; 
            text-align: center; 
            border-bottom: 1px solid var(--card-border); 
            position: sticky; top: 0; z-index: 100; 
        }

        /* 手書き風ロゴ */
        .logo { 
            font-family: 'Caveat', cursive; 
            font-size: 2.2rem; 
            color: var(--apple-blue); 
            margin: 0;
            letter-spacing: 1px;
        }

        .search-area { max-width: 500px; margin: 20px auto; padding: 0 15px; display: flex; gap: 10px; }
        input { 
            flex: 1; padding: 12px 16px; border-radius: 12px; 
            border: 1px solid var(--card-border); font-size: 16px; outline: none; 
        }
        button { 
            background: #333; color: white; border: none; padding: 0 20px; 
            border-radius: 12px; font-weight: 600; cursor: pointer; 
        }

        .container { max-width: 600px; margin: 0 auto; padding: 0 15px; }

        /* カードサイズをコンパクト（3分の2）に調整 */
        .hotel-card { 
            background: white; border-radius: 18px; margin-bottom: 16px; 
            display: flex; overflow: hidden; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            height: 140px; /* 高さを固定してコンパクトに */
        }
        
        .hotel-img { 
            width: 140px; /* 正方形に近い形で配置 */
            height: 140px; 
            object-fit: cover; 
        }

        .hotel-info { 
            padding: 12px 15px; flex: 1; 
            display: flex; flex-direction: column; justify-content: space-between;
        }

        .hotel-name { 
            font-size: 15px; font-weight: 700; margin: 0; 
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }

        .address { font-size: 11px; color: #86868b; margin-top: 4px; }

        .price-row { 
            display: flex; align-items: flex-end; justify-content: space-between; 
        }
        
        .price-val { font-size: 18px; font-weight: 700; color: #d6001c; }
        .price-unit { font-size: 10px; color: #86868b; margin-left: 2px; }

        .book-btn { 
            background: var(--apple-blue); color: white; text-decoration: none; 
            padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 600; 
        }

        @media (max-width: 400px) {
            .hotel-img { width: 110px; height: 140px; }
            .hotel-name { font-size: 14px; }
        }
    </style>
</head>
<body>

<header><p class="logo">Tomarun</p></header>

<form class="search-area" method="POST">
    <input type="text" name="keyword" placeholder="どこへ行きますか？" value="{{ keyword }}">
    <button type="submit">検索</button>
</form>

<div class="container">
    {% for h in hotels %}
    <div class="hotel-card">
        <img src="{{ h.hotelImageUrl }}" class="hotel-img" alt="{{ h.hotelName }}">
        <div class="hotel-info">
            <div>
                <h2 class="hotel-name">{{ h.hotelName }}</h2>
                <p class="address">📍 {{ h.address1 }}{{ h.address2 }}</p>
            </div>
            <div class="price-row">
                <div>
                    <span class="price-val">¥{{ h.hotelMinCharge }}</span><span class="price-unit">〜</span>
                </div>
                <a href="{{ h.target_url }}" class="book-btn" target="_blank" rel="noopener noreferrer">予約</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

</body>
</html>
