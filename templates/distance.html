<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>宿検索</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<h2>目的地検索</h2>

<input type="text" id="keyword" placeholder="例：沖縄美ら海水族館">
<button type="button" onclick="searchHotels()">検索</button>

<hr>

<div id="results"></div>

<script>
const APPLICATION_ID = "あなたのapplicationId";
const ACCESS_KEY = "あなたのaccessKey";

/* ✅ 目的地データベース */
const destinations = {
  "沖縄美ら海水族館": { lat: 26.69451309310509, lng: 127.87801499848918 },
  "ウッパマビーチ": { lat: 26.692852017176595, lng: 127.99204980657072 }
};

/* ✅ 距離計算 */
function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;

    const a =
        Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(lat1 * Math.PI / 180) *
        Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLon/2) *
        Math.sin(dLon/2);

    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c;
}

async function searchHotels() {

    const keyword = document.getElementById("keyword").value.trim();

    if (!keyword) {
        alert("目的地を入力してください");
        return;
    }

    const url =
    `https://openapi.rakuten.co.jp/engine/api/Travel/KeywordHotelSearch/20170426?format=json&keyword=${encodeURIComponent(keyword)}&applicationId=${APPLICATION_ID}&accessKey=${ACCESS_KEY}`;

    try {

        const response = await fetch(url);
        const data = await response.json();

        const resultsDiv = document.getElementById("results");
        resultsDiv.innerHTML = "";

        if (!data.hotels) {
            resultsDiv.innerHTML = "ホテルが見つかりませんでした";
            return;
        }

        data.hotels.forEach(hotel => {

            const info = hotel.hotel[0].hotelBasicInfo;

            let distanceText = "";

            /* ✅ 目的地がDBにある場合だけ距離計算 */
            if (destinations[keyword] && info.latitude && info.longitude) {

                const center = destinations[keyword];

                const distance = getDistance(
                    center.lat,
                    center.lng,
                    parseFloat(info.latitude),
                    parseFloat(info.longitude)
                );

                distanceText = `<p>距離： ${distance.toFixed(2)} km</p>`;
            }

            const html = `
                <div style="border:1px solid #ccc; padding:15px; margin:15px 0;">
                    <h3>${info.hotelName}</h3>
                    <p>最安料金： ¥${info.hotelMinCharge ?? "情報なし"}</p>
                    <p>住所： ${info.address1}${info.address2}</p>
                    ${distanceText}
                    <a href="${info.hotelInformationUrl}" target="_blank">
                        楽天で見る
                    </a>
                </div>
            `;

            resultsDiv.innerHTML += html;
        });

    } catch (error) {
        document.getElementById("results").innerHTML = "エラーが発生しました";
        console.error(error);
    }
}
</script>

</body>
</html>
