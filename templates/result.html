<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>宿検索</title>

<style>
body{
    font-family:sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:20px;
}

.search-box{
    margin-bottom:20px;
}

input{
    padding:10px;
    width:70%;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background:black;
    color:white;
}

.card{
    background:white;
    padding:15px;
    border-radius:12px;
    margin-bottom:20px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card img{
    width:100%;
    border-radius:10px;
    margin-bottom:10px;
}

.name{
    font-weight:bold;
    margin-bottom:5px;
}

.distance{
    color:#e63946;
    font-weight:bold;
    margin-bottom:10px;
}
</style>
</head>
<body>

<div class="search-box">
    <form method="POST">
        <input type="text" name="destination" placeholder="例：美ら海水族館">
        <button type="submit">検索</button>
    </form>
</div>

<h3>{{ destination_name }} 周辺の宿</h3>

{% for hotel in results %}
<div class="card">
    <img src="{{ hotel.image }}">
    <div class="name">{{ hotel.name }}</div>
    <div class="distance">{{ hotel.distance | round(2) }} km</div>
    <a href="{{ hotel.url }}" target="_blank">
        <button>公式サイトを見る</button>
    </a>
</div>
{% endfor %}

</body>
</html>
